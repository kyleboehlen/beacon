services:
  frontend-dev:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: beacon-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: pnpm dev --host 0.0.0.0
    environment:
      - NODE_ENV=development
    networks:
      - beacon-network

  frontend-storybook:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: beacon-storybook
    ports:
      - "6006:6006"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: pnpm storybook --host 0.0.0.0
    environment:
      - NODE_ENV=development
    networks:
      - beacon-network

  frontend-test:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: beacon-vitest
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: pnpm run test:unit
    environment:
      - NODE_ENV=test
    tty: true
    stdin_open: true
    networks:
      - beacon-network

  backend-test:
    image: mcr.microsoft.com/dotnet/sdk:9.0-alpine
    container_name: beacon-xunit
    working_dir: /src/backend.Tests
    volumes:
      - ../backend:/src/backend
      - ../backend.Tests:/src/backend.Tests
      # Exclude build artifacts to prevent container/host conflicts
      - /src/backend/obj
      - /src/backend/bin
      - /src/backend.Tests/obj
      - /src/backend.Tests/bin
    command: dotnet watch test
    environment:
      - DOTNET_ENVIRONMENT=Test
    tty: true
    stdin_open: true
    networks:
      - beacon-network

  http-test:
    image: jetbrains/intellij-http-client:latest
    container_name: beacon-http-test-dev
    restart: "no"
    volumes:
      - ../backend/Http:/workdir
    command: ["--env-file", "http-client.env.json", "--env", "docker-dev", "run-all.http"]
    depends_on:
      - backend-dev
    networks:
      - beacon-network
    tty: true
    stdin_open: true

  backend-dev:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: beacon-backend-dev
    ports:
      - "5002:8080"
    volumes:
      - ../backend:/src
      - /src/obj
      - /src/bin
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - mongodb
    networks:
      - beacon-network
      
  typegen:
    build:
      context: ..
      dockerfile: ./backend/DockerfileTypeGen
    container_name: beacon-typegen
    restart: "no"
    volumes:
      - ../frontend/src/shared/models/generated:/typegen/generated
      - ../backend:/app/backend
    networks:
      - beacon-network
          
  mongodb:
    image: mongo:7.0
    container_name: beacon-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=beacon
    volumes:
      - beacon_mongodb_data:/data/db
    networks:
      - beacon-network
        
  mailpit:
    image: axllent/mailpit
    container_name: beacon-mailpit
    restart: unless-stopped
    volumes:
      - ./data:/data
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - beacon-network

networks:
  beacon-network:
    driver: bridge
    
volumes:
  beacon_mongodb_data: